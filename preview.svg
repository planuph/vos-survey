<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003C45"/>
      <stop offset="50%" style="stop-color:#006D77"/>
      <stop offset="100%" style="stop-color:#004D56"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="980" cy="120" r="180" fill="rgba(131,197,190,0.08)"/>
  <circle cx="1050" cy="520" r="120" fill="rgba(226,149,120,0.07)"/>
  <circle cx="150" cy="500" r="100" fill="rgba(131,197,190,0.06)"/>
  <circle cx="200" cy="80" r="60" fill="rgba(255,255,255,0.04)"/>

  <!-- Left accent bar -->
  <rect x="80" y="140" width="6" height="350" rx="3" fill="#83C5BE"/>

  <!-- Hospital icon area -->
  <rect x="96" y="155" width="90" height="90" rx="18" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <text x="141" y="215" font-size="48" text-anchor="middle" dominant-baseline="middle">🏥</text>

  <!-- Main Title -->
  <text x="210" y="195" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="-1">แบบสำรวจ VOS</text>
  <text x="210" y="248" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="400" fill="rgba(255,255,255,0.75)">Voice of Stakeholder Survey</text>

  <!-- Divider line -->
  <line x1="96" y1="278" x2="820" y2="278" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Subtitle -->
  <text x="96" y="318" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="600" fill="#83C5BE">โรงพยาบาลมหาวิทยาลัยพะเยา / คณะแพทยศาสตร์</text>
  <text x="96" y="360" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.6)">เพื่อพัฒนาคุณภาพบริการ บุคลากร และระบบนิเวศการเรียนรู้ให้ยั่งยืน</text>

  <!-- Stats badges -->
  <!-- Badge 1 -->
  <rect x="96" y="400" width="200" height="64" rx="14" fill="rgba(131,197,190,0.18)" stroke="rgba(131,197,190,0.35)" stroke-width="1.5"/>
  <text x="196" y="426" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">กลุ่มผู้มีส่วนได้ส่วนเสีย</text>
  <text x="196" y="453" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">14 กลุ่ม</text>

  <!-- Badge 2 -->
  <rect x="314" y="400" width="200" height="64" rx="14" fill="rgba(131,197,190,0.18)" stroke="rgba(131,197,190,0.35)" stroke-width="1.5"/>
  <text x="414" y="426" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">ภายใน</text>
  <text x="414" y="453" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">6 กลุ่ม</text>

  <!-- Badge 3 -->
  <rect x="532" y="400" width="200" height="64" rx="14" fill="rgba(226,149,120,0.18)" stroke="rgba(226,149,120,0.35)" stroke-width="1.5"/>
  <text x="632" y="426" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">ภายนอก</text>
  <text x="632" y="453" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">8 กลุ่ม</text>

  <!-- Standards badges row -->
  <rect x="96" y="488" width="100" height="34" rx="8" fill="rgba(255,255,255,0.1)"/>
  <text x="146" y="510" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">HA</text>

  <rect x="206" y="488" width="100" height="34" rx="8" fill="rgba(255,255,255,0.1)"/>
  <text x="256" y="510" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">EdPEx</text>

  <rect x="316" y="488" width="100" height="34" rx="8" fill="rgba(255,255,255,0.1)"/>
  <text x="366" y="510" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">TQA</text>

  <rect x="426" y="488" width="100" height="34" rx="8" fill="rgba(255,255,255,0.1)"/>
  <text x="476" y="510" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">WFME</text>

  <!-- CTA Button area (right side) -->
  <rect x="870" y="240" width="240" height="150" rx="20" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <text x="990" y="296" font-family="'Segoe UI', Arial, sans-serif" font-size="36" text-anchor="middle">📝</text>
  <text x="990" y="336" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">กรอกแบบสำรวจ</text>
  <text x="990" y="362" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.55)" text-anchor="middle">คลิกลิงก์เพื่อเริ่มต้น</text>

  <!-- Bottom URL bar -->
  <rect x="0" y="588" width="1200" height="42" fill="rgba(0,0,0,0.25)"/>
  <text x="600" y="613" font-family="'Segoe UI', Arial, monospace" font-size="16" fill="rgba(255,255,255,0.45)" text-anchor="middle">🔗  planuph.github.io/vos-survey</text>
</svg>
